name: Build APKs

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build FOSS and Full APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" >/dev/null

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Install signing key
        env:
          SIGNING_KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
        run: |
          if [ -n "$SIGNING_KEYSTORE_B64" ]; then
            echo "$SIGNING_KEYSTORE_B64" | base64 -d > app/micasong.keystore
            echo "Signing key installed — releases will share a stable signature."
          else
            echo "No SIGNING_KEYSTORE_B64 secret set; falling back to the default debug key."
          fi

      - name: Run unit tests
        run: ./gradlew testFossDebugUnitTest

      - name: Build FOSS APK (free / F-Droid clean)
        run: ./gradlew assembleFossDebug

      - name: Build Full APK (with proprietary components)
        run: ./gradlew assembleFullDebug

      - name: Rename APKs
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/foss/debug/app-foss-debug.apk artifacts/MiCaSong-foss.apk
          cp app/build/outputs/apk/full/debug/app-full-debug.apk artifacts/MiCaSong-full.apk

      - name: Upload FOSS APK
        uses: actions/upload-artifact@v4
        with:
          name: MiCaSong-foss
          path: artifacts/MiCaSong-foss.apk

      - name: Upload Full APK
        uses: actions/upload-artifact@v4
        with:
          name: MiCaSong-full
          path: artifacts/MiCaSong-full.apk

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/MiCaSong-foss.apk
            artifacts/MiCaSong-full.apk
          generate_release_notes: true
